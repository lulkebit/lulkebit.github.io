<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Stapes Klassengenerator</title>
        <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Icon_S_red.svg/1200px-Icon_S_red.svg.png">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <h1 class="container-fluid p-5 text-white text-center" style="background-color: rgb(255, 0, 0);">Stapes Klassengenerator</h1>
        <div class="container mt-5">

                <div class="row justify-content-center">
                    <button class="btn btn-lg" id="generateButton" name="generateButton" onclick="generate()" style="background-color: rgb(255, 0, 0); color:white;">Generieren</button>
                </div>

                <hr class="hr hr-blurry"/>

                <div class="row justify-content-center">
                    <div class="col-md-3">  <!-- https://getbootstrap.com/docs/5.0/forms/validation/ -->
                        <div class="input-group mb-3">
                            <span class="input-group-text">Klassenname</span>
                            <div class="form-floating">
                                <input type="text" class="form-control" id="className" name="className" placeholder="Username" required>
                                <label for="className">Bsp.: 'myClass'</label>
                            </div>
                        </div>
                    </div>
                </div>

            <hr class="hr hr-blurry"/>

            <div class="row">
                <div class="col-md-1">
                    <h2>Parameter:</h2>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="addParameterButton" name="addParameterButton" onclick="addParameterInput()">Hinzufügen</button>
                </div>
                <div class="col-md-11">
                    <ul id="parameterList" style="list-style:none; padding-left: 0%"></ul>
                </div>
            </div>

            <hr class="hr hr-blurry"/>

            <div class="row">
                <div class="col-md-1">
                    <h2>Methoden:</h2>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="addMethodButton" name="addMethodButton" onclick="createMethodInput()">Hinzufügen</button>
                </div>
                <div class="col-md-11">
                    <ul id="methodsList" style="list-style:none; padding-left: 0%"></ul>
                </div>
            </div>

            <hr class="hr hr-blurry"/>

            <div id="outputDiv" class="row justify-content-center" hidden>
                <div class="col-sm-8 p-2">
                    <textarea id="output" name="output" rows="20" cols="150" disabled></textarea>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="copyText" name="copyText" onclick="copy()">Kopieren</button>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="downloadText" name="downloadText" onclick="download()">Herunterladen</button>
                </div>
            </div>

        </div>

        <script src="js/app.js"></script>

    </body>
</html>
