<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>StapesClassGenerator</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <h1 class="container-fluid p-5 text-white text-center" style="background-color: rgb(255, 0, 0);">Stapes Klassengenerator</h1>
        <div class="container mt-5">

            <div class="row justify-content-center">
                <button class="btn btn-lg" id="generateButton" name="generateButton" onclick="generate()" style="background-color: rgb(255, 0, 0); color:white;">Generieren</button>
            </div>

            <hr class="hr hr-blurry"/>

            <div class="row">
                <div class="col-md-5">
                    <h2>Klassenname:</h2>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="constructorCheckbox" checked>
                        <label class="form-check-label" for="constructorCheckbox">Konstruktor</label>
                    </div>
                </div>
                <div class="col-md-5">
                    <input type="text" id="className" name="className" placeholder="Klassenname">
                </div>
            </div>

            <hr class="hr hr-blurry"/>

            <div class="row">
                <div class="col-md-1">
                    <h2>Parameter:</h2>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="addParameterButton" name="addParameterButton" onclick="addParameter()">Hinzufügen</button>
                </div>
                <div class="col-md-11">
                    <ul id="parameterList" style="list-style:none; padding-left: 0%"></ul>
                </div>
            </div>

            <hr class="hr hr-blurry"/>

            <div class="row">
                <div class="col-md-1">
                    <h2>Methoden:</h2>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="addMethodButton" name="addMethodButton" onclick="addMethod()">Hinzufügen</button>
                </div>
                <div class="col-md-11">
                    <ul id="methodsList" style="list-style:none; padding-left: 0%"></ul>
                </div>
            </div>

            <hr class="hr hr-blurry"/>

            <div id="outputDiv" class="row justify-content-center" hidden>
                <div class="col-sm-8 p-2">
                    <textarea id="output" name="output" rows="20" cols="150" disabled></textarea>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="copyText" name="copyText" onclick="copy()">Kopieren</button>
                    <button class="btn" style="background-color: rgb(255, 0, 0); color:white;" id="downloadText" name="downloadText" onclick="download()">Herunterladen</button>
                </div>
            </div>
        </div>
        <script src="js/app.js"></script>
    </body>
</html>
